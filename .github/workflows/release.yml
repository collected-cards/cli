name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: collected-linux-amd64
            ext: ""
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: collected-linux-arm64
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: collected-macos-amd64
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: collected-macos-arm64
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: collected-windows-amd64
            ext: ".exe"
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: collected-windows-arm64
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (x86_64 Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (ARM64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/collected ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/collected.exe ${{ matrix.artifact }}.exe

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/collected-linux-amd64/collected-linux-amd64
            artifacts/collected-linux-arm64/collected-linux-arm64
            artifacts/collected-macos-amd64/collected-macos-amd64
            artifacts/collected-macos-arm64/collected-macos-arm64
            artifacts/collected-windows-amd64/collected-windows-amd64.exe
            artifacts/collected-windows-arm64/collected-windows-arm64.exe
